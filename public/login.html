<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - CryptoShop</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <div class="auth-container">
        <h1 class="glitch">Connexion</h1>

        <form class="auth-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="email" id="login-email" required>
                <label for="login-email">Email</label>
            </div>

            <div class="input-group">
                <input type="password" id="login-password" required>
                <label for="login-password">Mot de passe</label>
                <span class="toggle-password" onclick="togglePassword('login-password')">👁️</span>
            </div>

            <button type="submit" class="btn">Se connecter</button>

            <p class="switch-auth">Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Profil - CryptoChat</title>
    <link rel="stylesheet" href="profile_edit.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
                    </svg>
                    <span>CryptoChat</span>
                </div>
            </div>

            <div class="profile">
                <div class="profile-pic-container">
                    <img src="default-profile.png" alt="Photo de profil" class="profile-pic" id="sidebar-profile-pic">
                    <div class="status-badge online"></div>
                </div>
                <h3 class="username" id="sidebar-username">******</h3>
                <p class="user-status">En ligne</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item">
                        <a href="dashboard.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M20 7.093v-2.093c0-1.104-.896-2-2-2h-12c-1.104 0-2 .896-2 2v2.093c-1.16.412-2 1.523-2 2.907v7c0 1.654 1.346 3 3 3h14c1.654 0 3-1.346 3-3v-7c0-1.384-.84-2.495-2-2.907zm-14-2.093h12v2h-12v-2zm14 12c0 .551-.449 1-1 1h-14c-.551 0-1-.449-1-1v-7c0-.551.449-1 1-1h14c.551 0 1 .449 1 1v7z"/>
                            </svg>
                            Conversations
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="profile.html">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            Mon Profil
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            </svg>
                            Contacts
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M12 1v6m0 6v6m11-11h-6m-6 0H1"/>
                                <path d="M20.49 8.49l-4.24 4.24m-8.48 0l-4.24-4.24m16.97 7.02l-4.24-4.24m-8.48 0l-4.24 4.24"/>
                            </svg>
                            Paramètres
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="encryption-status">
                    <svg class="encryption-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <div class="encryption-info">
                        <span>Chiffrement actif</span>
                        <small>Bout-en-bout</small>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Déconnexion</span>
                </button>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Modifier le profil</h1>
                <div class="header-actions">
                    <button class="btn-secondary" onclick="goBackToProfile()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                        <span>Retour</span>
                    </button>
                </div>
            </header>

            <div class="edit-content">
                <form id="profile-form" class="edit-form">
                    <div class="form-section">
                        <h3>Photo de profil</h3>
                        <div class="photo-upload-section">
                            <div class="photo-preview">
                                <img src="default-avatar.png" alt="Photo de profil" id="profile-pic">
                                <div class="photo-overlay">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                        <circle cx="8.5" cy="8.5" r="1.5"/>
                                        <polyline points="21 15 16 10 5 21"/>
                                    </svg>
                                </div>
                            </div>
                            <input type="file" id="upload-photo" accept="image/*" hidden>
                            <button type="button" class="upload-btn" onclick="document.getElementById('upload-photo').click()">
                                Changer la photo
                            </button>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Informations personnelles</h3>
                        <div class="form-group">
                            <label for="username">Nom d'utilisateur</label>
                            <input type="text" id="username" class="form-input" placeholder="Nom d'utilisateur">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="form-input" placeholder="Email" disabled>
                            <small class="form-help">L'email ne peut pas être modifié</small>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Sécurité</h3>
                        <div class="form-group">
                            <label for="password">Nouveau mot de passe</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="password" class="form-input" placeholder="Laisser vide pour ne pas changer">
                                <button type="button" class="toggle-password" onclick="togglePassword()">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Confirmer le mot de passe</label>
                            <input type="password" id="confirm-password" class="form-input" placeholder="Confirmer le mot de passe">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="goBackToProfile()">Annuler</button>
                        <button type="submit" class="btn-save">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                                <polyline points="17 21 17 13 7 13 7 21"/>
                                <polyline points="7 3 7 8 15 8"/>
                            </svg>
                            <span>Enregistrer les modifications</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="profile_edit.js"></script>
</body>
</html>
